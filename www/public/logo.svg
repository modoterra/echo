<svg width="470" height="300" viewBox="0 0 470 300" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Echo Programming Language</title>
  <desc id="desc">A stylized Echo Programming Language logo.</desc>
  <defs>
    <linearGradient id="echo-gradient" x1="0" y1="14" x2="0" y2="286" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#A855F7"/>
      <stop offset="38%" stop-color="#6366F1"/>
      <stop offset="68%" stop-color="#0EA5E9"/>
      <stop offset="100%" stop-color="#06B6D4"/>
