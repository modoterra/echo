<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Echo Benchmark Results</title>
    <style>
      body {
        color: #172033;
        font-family: system-ui, sans-serif;
        margin: 2rem;
      }
      h1 {
        margin-bottom: 0.25rem;
      }
      .chart {
        margin-top: 2rem;
      }
      .note {
        color: #5b667a;
      }
      .stats {
        display: grid;
        gap: 1rem;
        grid-template-columns: repeat(auto-fit, minmax(12rem, 1fr));
        margin-top: 1.5rem;
      }
      .stat {
        background: #f6f8fb;
        border: 1px solid #dfe5ef;
        border-radius: 0.75rem;
        padding: 1rem;
      }
      .stat strong {
        display: block;
        font-size: 1.5rem;
      }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/vega@5.30.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/vega-lite@5.21.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/vega-embed@6.26.0"></script>
  </head>
  <body>
    <h1 id="title">Echo PHP Benchmark Results</h1>
    <p class="note">
      Open from <code id="results-path">test-results/php/benchmark.html</code>. Benchmark data is embedded
      directly in this file so it works from <code>file://</code>. CDN scripts are pinned
      for local convenience.
    </p>

    <div id="stats" class="stats"></div>
    <div id="summary" class="chart"></div>
    <div id="speedup" class="chart"></div>
    <div id="time" class="chart"></div>
    <div id="memory" class="chart"></div>
    <div id="cpu" class="chart"></div>

    <script type="application/json" id="benchmark-data">__BENCHMARK_DATA_JSON__</script>
    <script>
      async function loadSuite() {
        const suite = JSON.parse(document.getElementById("benchmark-data").textContent);
        return suite;
      }

      function labels(suite) {
        return {
          baseline: suite.baseline_label || "PHP",
          candidate: suite.candidate_label || "Echo",
          speedup: suite.speedup_label || "Echo Speedup vs PHP",
        };
      }

      function renderStats(suite) {
        const phpTotal = suite.rows.reduce((sum, row) => sum + row.php_total_ms, 0);
        const echoTotal = suite.rows.reduce((sum, row) => sum + row.echo_total_ms, 0);
        const speedup = phpTotal / echoTotal;
        document.getElementById("stats").innerHTML = `
          <div class="stat"><span>Fixtures</span><strong>${suite.rows.length}</strong></div>
          <div class="stat"><span>Iterations Each</span><strong>${suite.iterations}</strong></div>
          <div class="stat"><span>Suite Wall Time</span><strong>${suite.suite_total_ms.toFixed(0)} ms</strong></div>
          <div class="stat"><span>Aggregate Speedup</span><strong>${speedup.toFixed(2)}x</strong></div>
        `;
      }

      function baseSpec(rows, title) {
        return {
          $schema: "https://vega.github.io/schema/vega-lite/v5.json",
          title,
          width: 960,
          height: 360,
          data: { values: rows },
        };
      }

      function foldSpec(rows, title, fields, yTitle) {
        return {
          ...baseSpec(rows, title),
          transform: [{ fold: fields, as: ["tool", "value"] }],
          mark: "bar",
          encoding: {
            x: { field: "fixture", type: "nominal", sort: null, axis: { labelAngle: -45 } },
            y: { field: "value", type: "quantitative", title: yTitle },
            color: { field: "tool", type: "nominal" },
            tooltip: [
              { field: "fixture", type: "nominal" },
              { field: "tool", type: "nominal" },
              { field: "value", type: "quantitative" },
            ],
          },
        };
      }

      async function main() {
        const suite = await loadSuite();
        const rows = suite.rows;
        const suiteLabels = labels(suite);
        const phpTotal = rows.reduce((sum, row) => sum + row.php_total_ms, 0);
        const echoTotal = rows.reduce((sum, row) => sum + row.echo_total_ms, 0);

        document.title = suite.title || "Echo PHP Benchmark Results";
        document.getElementById("title").textContent = suite.title || "Echo PHP Benchmark Results";
        document.getElementById("results-path").textContent =
          suite.results_path || "test-results/php/benchmark.html";
        renderStats(suite);

        await vegaEmbed("#summary", {
          ...baseSpec(
            [
              { tool: suiteLabels.baseline, total_ms: phpTotal },
              { tool: suiteLabels.candidate, total_ms: echoTotal },
            ],
            "Suite Total Runtime"
          ),
          width: 480,
          height: 260,
          mark: "bar",
          encoding: {
            x: { field: "tool", type: "nominal", sort: null },
            y: { field: "total_ms", type: "quantitative", title: "total ms" },
            color: { field: "tool", type: "nominal" },
            tooltip: [
              { field: "tool", type: "nominal" },
              { field: "total_ms", type: "quantitative" },
            ],
          },
        });

        await vegaEmbed("#speedup", {
          ...baseSpec(rows, suiteLabels.speedup),
          mark: "bar",
          encoding: {
            x: { field: "fixture", type: "nominal", sort: null, axis: { labelAngle: -45 } },
            y: { field: "speedup", type: "quantitative", title: "speedup (x)" },
            tooltip: [
              { field: "fixture", type: "nominal" },
              { field: "speedup", type: "quantitative" },
            ],
          },
        });

        await vegaEmbed(
          "#time",
          foldSpec(rows, "Average Wall Time", ["php_avg_us", "echo_avg_us"], "microseconds")
        );

        await vegaEmbed(
          "#memory",
          foldSpec(rows, "Maximum RSS", ["php_max_rss_kb", "echo_max_rss_kb"], "KB")
        );

        await vegaEmbed(
          "#cpu",
          foldSpec(rows, "User CPU Time", ["php_user_cpu_s", "echo_user_cpu_s"], "seconds")
        );
      }

      main().catch((error) => {
        document.body.insertAdjacentHTML(
          "beforeend",
          `<pre>Failed to load benchmark data: ${error}</pre>`
        );
      });
    </script>
  </body>
</html>
